spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.default-encoding=UTF-8
spring.mail.test-connection=${SPRING_MAIL_TEST_CONNECTION:false}
app.email.from=${APP_EMAIL_FROM:${SPRING_MAIL_USERNAME}}
app.backend.url=${APP_BACKEND_URL:http://localhost:8080}
app.verification.token-expiration-ms=86400000
app.password-reset.token-expiration-ms=3600000

